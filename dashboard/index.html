<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraOps — Stellar Intelligence Dashboard</title>
    <meta name="description" content="AuraOps: Interactive 3D Universe Atlas — Real-time autonomous AI-powered merge request analysis, security scoring, carbon optimization, and deployment decisions.">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-void: #050510;
            --bg-card: rgba(10, 14, 30, 0.75);
            --bg-glass: rgba(15, 20, 40, 0.6);
            --border-glow: rgba(0, 240, 255, 0.15);
            --border-subtle: rgba(100, 120, 160, 0.12);
            --text-primary: #e0e8f0;
            --text-secondary: #8b95a8;
            --text-muted: #5a6478;
            --cyan: #00f0ff;
            --cyan-glow: rgba(0, 240, 255, 0.3);
            --violet: #9d05ff;
            --violet-glow: rgba(157, 5, 255, 0.2);
            --emerald: #50ffb0;
            --emerald-glow: rgba(80, 255, 176, 0.2);
            --coral: #f97066;
            --amber: #f59e0b;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── 3D CANVAS ── */
        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
        }

        /* ── NEBULA BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(107, 33, 168, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 30%, rgba(0, 240, 255, 0.04) 0%, transparent 40%),
                radial-gradient(ellipse at 20% 80%, rgba(76, 29, 149, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        /* ── OVERLAY CONTAINER ── */
        .hud-overlay {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }
        .hud-overlay > * { pointer-events: auto; }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            position: relative;
            z-index: 2;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 16px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 20px;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px var(--cyan-glow);
        }
        .header-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), #dbfcff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .header-text .subtitle {
            font-size: 11px; color: var(--text-muted);
            font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase; margin-top: 1px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(80, 255, 176, 0.08);
            color: var(--emerald);
            border: 1px solid rgba(80, 255, 176, 0.2);
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--emerald);
            box-shadow: 0 0 8px var(--emerald-glow);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 18px; border-radius: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
            min-width: 280px;
        }
        .search-bar input {
            background: none; border: none; outline: none;
            color: var(--text-primary); font-family: 'Inter', sans-serif;
            font-size: 13px; width: 100%;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-icon, .mic-icon { color: var(--text-muted); font-size: 14px; cursor: pointer; }
        .mic-icon:hover { color: var(--cyan); }

        /* ── DEMO BUTTON ── */
        .demo-btn {
            padding: 8px 20px; border-radius: 10px; border: none; cursor: pointer;
            font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            color: white; letter-spacing: 0.5px;
            box-shadow: 0 4px 20px var(--cyan-glow);
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 6px;
        }
        .demo-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--cyan-glow); }
        .demo-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .demo-btn .spinner {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── GLASS PANELS ── */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 240, 255, 0.03);
            transition: all 0.3s ease;
        }
        .glass-panel:hover {
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.06);
        }

        /* ── METRICS ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px; margin-bottom: 20px;
        }
        .metric-card { padding: 16px 18px; }
        .metric-icon { font-size: 18px; margin-bottom: 8px; }
        .metric-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px; font-weight: 700;
            letter-spacing: -1px; line-height: 1; margin-bottom: 4px;
        }
        .metric-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .metric-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .mv-cyan { color: var(--cyan); }
        .mv-emerald { color: var(--emerald); }
        .mv-coral { color: var(--coral); }
        .mv-violet { color: var(--violet); }
        .mv-amber { color: var(--amber); }

        /* ── CHARTS ── */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        .chart-card { padding: 16px 18px; }
        .chart-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .chart-container { height: 160px; position: relative; }

        /* ── TABLE ── */
        .table-card { overflow: hidden; margin-bottom: 20px; }
        .table-header {
            padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
        }
        .refresh-text { font-size: 10px; color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left; padding: 10px 14px;
            font-size: 10px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.8px; background: rgba(0,0,0,0.2);
        }
        tbody td {
            padding: 10px 14px; font-size: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: rgba(0, 240, 255, 0.03); }
        tbody tr:last-child td { border-bottom: none; }
        .mr-number { font-weight: 700; color: var(--cyan); }
        .mr-title-cell {
            max-width: 200px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
            color: var(--text-secondary);
        }
        .decision-badge {
            display: inline-flex; padding: 3px 10px; border-radius: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .decision-badge.approved { background: rgba(80,255,176,0.1); color: var(--emerald); border: 1px solid rgba(80,255,176,0.15); }
        .decision-badge.needs-fix { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.15); }
        .decision-badge.blocked { background: rgba(249,112,102,0.1); color: var(--coral); border: 1px solid rgba(249,112,102,0.15); }
        .score-green { color: var(--emerald); font-weight: 700; }
        .score-amber { color: var(--amber); font-weight: 700; }
        .score-red { color: var(--coral); font-weight: 700; }
        .patches-badge {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 700;
            background: rgba(80,255,176,0.1); color: var(--emerald);
        }
        .deploy-link {
            color: var(--cyan); text-decoration: none; font-weight: 600; font-size: 11px;
            transition: color 0.2s;
        }
        .deploy-link:hover { color: #7df4ff; }
        .no-deploy { color: var(--text-muted); font-size: 11px; }

        /* ── PIPELINE VIZ ── */
        .pipeline-viz { padding: 16px 20px; margin-bottom: 20px; }
        .pipeline-viz-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .pipeline-flow { display: flex; align-items: center; gap: 0; overflow-x: auto; }
        .pipeline-phase { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .phase-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
        .phase-agents { display: flex; gap: 5px; }
        .agent-node {
            width: 68px; min-height: 52px; border-radius: 8px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            font-size: 9px; font-weight: 600; text-align: center;
            background: rgba(20,30,60,0.5); border: 1.5px solid var(--border-subtle);
            color: var(--text-muted); transition: all 0.4s ease; padding: 5px 3px;
        }
        .agent-node.running {
            background: rgba(0,240,255,0.08); border-color: var(--cyan);
            color: var(--cyan); box-shadow: 0 0 16px var(--cyan-glow);
            animation: nodePulse 1.5s ease-in-out infinite;
        }
        .agent-node.done {
            background: rgba(80,255,176,0.06); border-color: var(--emerald);
            color: var(--emerald); box-shadow: 0 0 12px var(--emerald-glow);
        }
        .agent-node .agent-icon { font-size: 15px; }
        .agent-node .agent-time { font-size: 8px; color: var(--text-muted); }
        .pipeline-arrow { color: var(--text-muted); font-size: 16px; margin: 0 5px; padding-top: 12px; }
        .pipeline-arrow.active { color: var(--cyan); }
        @keyframes nodePulse { 0%,100% { box-shadow: 0 0 8px var(--cyan-glow); } 50% { box-shadow: 0 0 24px var(--cyan-glow); } }

        /* ── DIFF VIEWER ── */
        .diff-viewer { padding: 16px; margin-bottom: 20px; }
        .diff-viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .diff-viewer-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .diff-toggle { font-size: 11px; color: var(--text-muted); }
        .diff-list { display: flex; flex-direction: column; gap: 10px; }
        .diff-item { border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
        .diff-item-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.25); flex-wrap: wrap; }
        .diff-vuln-type { font-weight: 700; font-size: 12px; }
        .diff-severity { padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .diff-severity.crit { background: rgba(249,112,102,0.12); color: var(--coral); }
        .diff-severity.high { background: rgba(245,158,11,0.12); color: var(--amber); }
        .diff-confidence { font-size: 10px; color: var(--emerald); font-weight: 600; margin-left: auto; }
        .diff-file { font-size: 10px; color: var(--text-muted); font-family: monospace; }
        .diff-panels { display: grid; grid-template-columns: 1fr 1fr; }
        .diff-panel { padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .diff-panel.before { background: rgba(249,112,102,0.03); border-right: 1px solid var(--border-subtle); color: #fca5a5; }
        .diff-panel.after { background: rgba(80,255,176,0.03); color: #6ee7b7; }
        .diff-panel-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; font-family: 'Inter', sans-serif; }
        .diff-panel.before .diff-panel-label { color: var(--coral); }
        .diff-panel.after .diff-panel-label { color: var(--emerald); }

        /* ── LIVE FEED ── */
        .live-feed { padding: 16px; margin-top: 20px; }
        .live-feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .live-feed-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; }
        .feed-list {
            max-height: 160px; overflow-y: auto;
            font-size: 11px; font-family: 'JetBrains Mono', monospace;
            line-height: 1.7; color: var(--text-secondary);
        }
        .feed-list::-webkit-scrollbar { width: 3px; }
        .feed-list::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        .feed-entry { padding: 1px 0; }
        .feed-time { color: var(--text-muted); margin-right: 6px; }

        /* ── IMPACT BANNER ── */
        .impact-banner {
            background: linear-gradient(135deg, rgba(0,240,255,0.05), rgba(157,5,255,0.05), rgba(80,255,176,0.05));
            border: 1px solid var(--border-glow);
            border-radius: var(--radius);
            padding: 16px 24px; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: space-around; gap: 12px;
            backdrop-filter: blur(12px);
        }
        .impact-stat { text-align: center; }
        .impact-stat .val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1;
        }
        .impact-stat .val.cyan-grad { background: linear-gradient(135deg, var(--cyan), #7df4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .impact-stat .val.emerald-grad { background: linear-gradient(135deg, var(--emerald), #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .impact-stat .val.violet-grad { background: linear-gradient(135deg, var(--violet), #dfb7ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .impact-stat .lbl { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-top: 3px; }
        .impact-sep { width: 1px; height: 36px; background: var(--border-subtle); }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 550px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    <div id="root" class="hud-overlay"></div>

    <!-- ── THREE.JS 3D SCENE ── -->
    <script>
    (function() {
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        camera.position.set(0, 0, 18);

        // ── STARS ──
        const starGeom = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 200;
        starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 });
        scene.add(new THREE.Points(starGeom, starMat));

        // ── PLANET HELPER ──
        function createPlanet(radius, color, emissive, pos, glowScale) {
            const group = new THREE.Group();
            // Core sphere
            const geo = new THREE.SphereGeometry(radius, 48, 48);
            const mat = new THREE.MeshStandardMaterial({
                color: color, emissive: emissive,
                emissiveIntensity: 0.4, roughness: 0.3, metalness: 0.6,
            });
            const mesh = new THREE.Mesh(geo, mat);
            group.add(mesh);
            // Atmospheric glow
            const glowGeo = new THREE.SphereGeometry(radius * (glowScale || 1.35), 48, 48);
            const glowMat = new THREE.MeshBasicMaterial({
                color: emissive, transparent: true, opacity: 0.08, side: THREE.BackSide,
            });
            group.add(new THREE.Mesh(glowGeo, glowMat));
            group.position.set(pos[0], pos[1], pos[2]);
            scene.add(group);
            return { group, mesh };
        }

        // ── CORE API PLANET (large, central) ──
        const core = createPlanet(1.6, 0x00a0b0, 0x00f0ff, [0, 0, 0], 1.5);

        // ── ORBITING SERVICE PLANETS ──
        const services = [
            { name: 'Security',     color: 0xf97066, emissive: 0xff4444, angle: 0,         dist: 5.0, speed: 0.15 },
            { name: 'GreenOps',     color: 0x10b981, emissive: 0x50ffb0, angle: Math.PI*0.4, dist: 5.5, speed: 0.12 },
            { name: 'Validation',   color: 0xf59e0b, emissive: 0xffc107, angle: Math.PI*0.8, dist: 4.8, speed: 0.18 },
            { name: 'RiskEngine',   color: 0x8b5cf6, emissive: 0x9d05ff, angle: Math.PI*1.2, dist: 5.2, speed: 0.1 },
            { name: 'Compliance',   color: 0x3b82f6, emissive: 0x00aaff, angle: Math.PI*1.6, dist: 4.5, speed: 0.14 },
        ];

        const planets = services.map(s => {
            const x = Math.cos(s.angle) * s.dist;
            const z = Math.sin(s.angle) * s.dist;
            const y = (Math.random() - 0.5) * 2;
            const p = createPlanet(0.5, s.color, s.emissive, [x, y, z], 1.4);
            p.angle = s.angle; p.dist = s.dist; p.speed = s.speed; p.yBase = y;
            return p;
        });

        // ── ORBITAL RINGS ──
        services.forEach(s => {
            const curve = new THREE.EllipseCurve(0, 0, s.dist, s.dist * 0.7, 0, 2*Math.PI, false, 0);
            const pts = curve.getSpacedPoints(80);
            const pts3 = pts.map(p => new THREE.Vector3(p.x, 0, p.y));
            const ringGeo = new THREE.BufferGeometry().setFromPoints(pts3);
            const ringMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.06 });
            scene.add(new THREE.Line(ringGeo, ringMat));
        });

        // ── CONNECTION BEAMS ──
        function updateBeams() {
            scene.children.filter(c => c.userData && c.userData.isBeam).forEach(c => scene.remove(c));
            planets.forEach(p => {
                const pts = [core.group.position.clone(), p.group.position.clone()];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.12 });
                const line = new THREE.Line(geo, mat);
                line.userData.isBeam = true;
                scene.add(line);
            });
        }

        // ── LIGHTING ──
        scene.add(new THREE.AmbientLight(0x334466, 0.5));
        const pointLight = new THREE.PointLight(0x00f0ff, 1.2, 30);
        pointLight.position.set(0, 3, 5);
        scene.add(pointLight);
        const pointLight2 = new THREE.PointLight(0x9d05ff, 0.5, 25);
        pointLight2.position.set(-5, -2, -3);
        scene.add(pointLight2);

        // ── MOUSE INTERACTION ──
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // ── ANIMATE ──
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Rotate core planet
            core.mesh.rotation.y = t * 0.2;

            // Orbit service planets
            planets.forEach(p => {
                p.angle += p.speed * 0.005;
                const x = Math.cos(p.angle) * p.dist;
                const z = Math.sin(p.angle) * p.dist * 0.7;
                p.group.position.set(x, p.yBase + Math.sin(t * 0.5 + p.angle) * 0.3, z);
                p.mesh.rotation.y = t * 0.3;
            });

            updateBeams();

            // Camera follows mouse gently
            camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 1.5 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);

            // Pulse core glow
            core.group.children[1].material.opacity = 0.06 + Math.sin(t * 1.5) * 0.03;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>

    <!-- ── REACT DASHBOARD OVERLAY ── -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MOCK_DATA = [
            { mr_iid: 38, mr_title: "fix: database connection pooling", author: "sarah", decision: "BLOCK", confidence: 92, sec_score: 22, eco_score: 65, co2_saved: 0, deploy_url: null, elapsed: 38, timestamp: "2026-03-18T08:12:00Z", patches_committed: 0, vuln_count: 4, time_saved_min: 0 },
            { mr_iid: 39, mr_title: "feat: add user authentication flow", author: "alex", decision: "NEEDS_FIX", confidence: 68, sec_score: 44, eco_score: 58, co2_saved: 0.8, deploy_url: null, elapsed: 42, timestamp: "2026-03-18T10:24:00Z", patches_committed: 1, vuln_count: 3, time_saved_min: 25 },
            { mr_iid: 40, mr_title: "refactor: optimize user queries", author: "sarah", decision: "APPROVE", confidence: 95, sec_score: 96, eco_score: 88, co2_saved: 1.2, deploy_url: "https://auraops-app-v40.run.app", elapsed: 35, timestamp: "2026-03-18T14:05:00Z", patches_committed: 1, vuln_count: 1, time_saved_min: 15 },
            { mr_iid: 41, mr_title: "feat: payment gateway integration", author: "mike", decision: "APPROVE", confidence: 88, sec_score: 82, eco_score: 76, co2_saved: 2.4, deploy_url: "https://auraops-app-v41.run.app", elapsed: 51, timestamp: "2026-03-19T07:15:00Z", patches_committed: 2, vuln_count: 2, time_saved_min: 45 },
            { mr_iid: 42, mr_title: "feat: add user payment flow", author: "devname", decision: "APPROVE", confidence: 91, sec_score: 84, eco_score: 82, co2_saved: 2.4, deploy_url: "https://auraops-demo.run.app", elapsed: 43, timestamp: "2026-03-19T09:23:00Z", patches_committed: 3, vuln_count: 3, time_saved_min: 70 },
            { mr_iid: 43, mr_title: "chore: update CI for multi-region deploy", author: "alex", decision: "APPROVE", confidence: 94, sec_score: 100, eco_score: 95, co2_saved: 5.8, deploy_url: "https://auraops-app-v43.run.app", elapsed: 29, timestamp: "2026-03-19T11:01:00Z", patches_committed: 0, vuln_count: 0, time_saved_min: 0 },
        ];

        function scoreColor(s) { return s >= 70 ? 'score-green' : s >= 40 ? 'score-amber' : 'score-red'; }
        function decisionClass(d) { return d === 'APPROVE' ? 'approved' : d === 'NEEDS_FIX' ? 'needs-fix' : 'blocked'; }
        function decisionLabel(d) { return d === 'APPROVE' ? 'Approved' : d === 'NEEDS_FIX' ? 'Needs Fix' : 'Blocked'; }

        function Header({ isLive, demoStatus, demoRunning, onRunDemo }) {
            return (
                <header className="header">
                    <div className="header-left">
                        <div className="logo">✦</div>
                        <div className="header-text">
                            <h1>STELLAR INTELLIGENCE</h1>
                            <div className="subtitle">Autonomous Release Authority</div>
                        </div>
                    </div>
                    <div className="search-bar">
                        <span className="search-icon">🔍</span>
                        <input type="text" placeholder="Search nodes, pipelines..." />
                        <span className="mic-icon" title="Voice search">🎤</span>
                    </div>
                    <div className="header-right">
                        <button className="demo-btn" onClick={onRunDemo} disabled={demoRunning}>
                            {demoStatus === 'running' ? (<><span className="spinner"></span> Scanning...</>) :
                             demoStatus === 'done' ? '✅ Complete' : '⚡ Initiate Scan'}
                        </button>
                        <div className="status-pill">
                            <div className="status-dot"></div>
                            {isLive ? 'ONLINE' : 'DEMO'}
                        </div>
                    </div>
                </header>
            );
        }

        function ImpactBanner({ data }) {
            const totalVulns = data.reduce((s, d) => s + (d.patches_committed || 0), 0);
            const totalMins = data.reduce((s, d) => s + (d.time_saved_min || 0), 0);
            const totalMRs = data.length;
            return (
                <div className="impact-banner glass-panel">
                    <div className="impact-stat"><div className="val coral" style={{background:'linear-gradient(135deg,#f97066,#fb923c)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{totalVulns}</div><div className="lbl">Vulnerabilities Patched</div></div>
                    <div className="impact-sep"></div>
                    <div className="impact-stat"><div className="val emerald-grad">{totalMins}</div><div className="lbl">Minutes Saved</div></div>
                    <div className="impact-sep"></div>
                    <div className="impact-stat"><div className="val cyan-grad">{totalMRs}</div><div className="lbl">MRs Secured</div></div>
                </div>
            );
        }

        function MetricCards({ data }) {
            const totalMRs = data.length;
            const totalCO2 = data.reduce((s, d) => s + (d.co2_saved || 0), 0).toFixed(1);
            const avgSec = totalMRs > 0 ? Math.round(data.reduce((s, d) => s + (d.sec_score || 0), 0) / totalMRs) : 0;
            const totalPatches = data.reduce((s, d) => s + (d.patches_committed || 0), 0);
            const approvals = data.filter(d => d.decision === 'APPROVE').length;
            return (
                <div className="metrics-grid">
                    <div className="metric-card glass-panel"><div className="metric-icon">📊</div><div className="metric-value mv-cyan">{totalMRs}</div><div className="metric-label">MRs Processed</div></div>
                    <div className="metric-card glass-panel"><div className="metric-icon">🔐</div><div className="metric-value mv-coral">{totalPatches}</div><div className="metric-label">Vulns Patched</div></div>
                    <div className="metric-card glass-panel"><div className="metric-icon">🔒</div><div className="metric-value mv-violet">{avgSec}</div><div className="metric-label">Avg Security</div></div>
                    <div className="metric-card glass-panel"><div className="metric-icon">🌍</div><div className="metric-value mv-emerald">{totalCO2}</div><div className="metric-label">CO₂ Saved (kg)</div></div>
                    <div className="metric-card glass-panel"><div className="metric-icon">🚀</div><div className="metric-value mv-amber">{approvals}</div><div className="metric-label">Approvals</div></div>
                </div>
            );
        }

        function Charts({ data }) {
            const scoresRef = useRef(null); const co2Ref = useRef(null);
            const sChart = useRef(null); const cChart = useRef(null);
            useEffect(() => {
                if (!data || !data.length) return;
                const labels = data.map(d => `!${d.mr_iid}`);
                const sec = data.map(d => d.sec_score || 0);
                const eco = data.map(d => d.eco_score || 0);
                let cum = 0; const co2C = data.map(d => { cum += (d.co2_saved||0); return parseFloat(cum.toFixed(1)); });
                const opts = { responsive:true, maintainAspectRatio:false, animation:false, plugins:{legend:{labels:{color:'#8b95a8',font:{family:'Inter',size:10,weight:'600'},boxWidth:10,padding:12}}}, scales:{x:{ticks:{color:'#5a6478',font:{size:10}},grid:{color:'rgba(100,120,160,0.08)'}},y:{ticks:{color:'#5a6478',font:{size:10}},grid:{color:'rgba(100,120,160,0.08)'}}} };
                if (sChart.current) { sChart.current.data.labels=labels; sChart.current.data.datasets[0].data=sec; sChart.current.data.datasets[1].data=eco; sChart.current.update('none'); }
                else if (scoresRef.current) { sChart.current = new Chart(scoresRef.current, { type:'line', data:{ labels, datasets:[{ label:'Security', data:sec, borderColor:'#f97066', backgroundColor:'rgba(249,112,102,0.08)', borderWidth:2, tension:0.35, pointRadius:3, pointBackgroundColor:'#f97066', fill:true },{ label:'Eco', data:eco, borderColor:'#50ffb0', backgroundColor:'rgba(80,255,176,0.08)', borderWidth:2, tension:0.35, pointRadius:3, pointBackgroundColor:'#50ffb0', fill:true }] }, options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, min:0, max:100}}} }); }
                if (cChart.current) { cChart.current.data.labels=labels; cChart.current.data.datasets[0].data=co2C; cChart.current.update('none'); }
                else if (co2Ref.current) { cChart.current = new Chart(co2Ref.current, { type:'bar', data:{ labels, datasets:[{ label:'Cumulative CO₂ (kg)', data:co2C, backgroundColor:'rgba(80,255,176,0.25)', borderColor:'#50ffb0', borderWidth:1.5, borderRadius:5 }] }, options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, min:0}}} }); }
            }, [data]);
            return (
                <div className="charts-grid">
                    <div className="chart-card glass-panel"><div className="chart-title">📈 Score Trends</div><div className="chart-container"><canvas ref={scoresRef}></canvas></div></div>
                    <div className="chart-card glass-panel"><div className="chart-title">🌱 CO₂ Saved</div><div className="chart-container"><canvas ref={co2Ref}></canvas></div></div>
                </div>
            );
        }

        const AGENTS = { security:{icon:'🔐',label:'Security'}, greenops:{icon:'🌍',label:'GreenOps'}, validation:{icon:'✅',label:'Validate'}, risk:{icon:'🧠',label:'Risk'}, compliance:{icon:'📋',label:'Comply'}, deploy:{icon:'🚀',label:'Deploy'} };

        function PipelineViz({ pipelineState }) {
            const { phase, agents } = pipelineState;
            const getStatus = (n, ph) => { const a = agents[n]; if (!a) return phase > ph ? 'done' : ''; return a.status; };
            const pa = (ph) => phase >= ph;
            return (
                <div className="pipeline-viz glass-panel">
                    <div className="pipeline-viz-title">🏗️ Agent Pipeline</div>
                    <div className="pipeline-flow">
                        <div className="pipeline-phase"><div className="phase-label">Trigger</div><div className="phase-agents"><div className={`agent-node ${phase>=1?'done':''}`}><span className="agent-icon">⚡</span>Webhook</div></div></div>
                        <div className={`pipeline-arrow ${pa(1)?'active':''}`}>→</div>
                        <div className="pipeline-phase"><div className="phase-label">Phase 1</div><div className="phase-agents">{['security','greenops','validation'].map(n=>(<div key={n} className={`agent-node ${getStatus(n,1)}`}><span className="agent-icon">{AGENTS[n].icon}</span>{AGENTS[n].label}{agents[n]?.time&&<span className="agent-time">{agents[n].time}s</span>}</div>))}</div></div>
                        <div className={`pipeline-arrow ${pa(2)?'active':''}`}>→</div>
                        <div className="pipeline-phase"><div className="phase-label">Phase 2</div><div className="phase-agents"><div className={`agent-node ${getStatus('risk',2)}`}><span className="agent-icon">🧠</span>RiskEngine{agents.risk?.time&&<span className="agent-time">{agents.risk.time}s</span>}</div></div></div>
                        <div className={`pipeline-arrow ${pa(3)?'active':''}`}>→</div>
                        <div className="pipeline-phase"><div className="phase-label">Phase 3</div><div className="phase-agents">{['compliance','deploy'].map(n=>(<div key={n} className={`agent-node ${getStatus(n,3)}`}><span className="agent-icon">{AGENTS[n].icon}</span>{AGENTS[n].label}{agents[n]?.time&&<span className="agent-time">{agents[n].time}s</span>}</div>))}</div></div>
                        <div className={`pipeline-arrow ${phase>=4?'active':''}`}>→</div>
                        <div className="pipeline-phase"><div className="phase-label">Result</div><div className="phase-agents"><div className={`agent-node ${phase>=4?'done':''}`}><span className="agent-icon">📊</span>Scorecard</div></div></div>
                    </div>
                </div>
            );
        }

        function HistoryTable({ data }) {
            const rows = [...data].reverse();
            return (
                <div className="table-card glass-panel">
                    <div className="table-header"><h2>📋 MR History</h2><span className="refresh-text">Auto-refreshes every 30s</span></div>
                    <table><thead><tr><th>MR#</th><th>Title</th><th>Decision</th><th>Security</th><th>Patches</th><th>Eco</th><th>CO₂</th><th>Deploy</th></tr></thead>
                    <tbody>{rows.map((r,i)=>(<tr key={i}><td><span className="mr-number">!{r.mr_iid}</span></td><td className="mr-title-cell" title={r.mr_title}>{r.mr_title}</td><td><span className={`decision-badge ${decisionClass(r.decision)}`}>{decisionLabel(r.decision)}</span></td><td><span className={scoreColor(r.sec_score)}>{r.sec_score}</span></td><td>{(r.patches_committed||0)>0?<span className="patches-badge">✅ {r.patches_committed}</span>:<span className="no-deploy">—</span>}</td><td><span className={scoreColor(r.eco_score)}>{r.eco_score}</span></td><td>{r.co2_saved>0?`${r.co2_saved} kg`:'—'}</td><td>{r.deploy_url?<a href={r.deploy_url} target="_blank" rel="noopener" className="deploy-link">Live ↗</a>:<span className="no-deploy">—</span>}</td></tr>))}</tbody></table>
                </div>
            );
        }

        const DEMO_VULNS = [
            { type:'SQL Injection', severity:'crit', confidence:96, file:'demo_vulnerable_app.py:38', before:'query = f"SELECT * FROM users WHERE id = {user_id}"', after:'query = "SELECT * FROM users WHERE id = ?"\ncursor.execute(query, (user_id,))' },
            { type:'Hardcoded API Key', severity:'crit', confidence:98, file:'demo_vulnerable_app.py:29', before:'STRIPE_API_KEY = "sk_live_4eC39..."', after:'STRIPE_API_KEY = os.environ.get("STRIPE_API_KEY", "")' },
            { type:'Command Injection', severity:'crit', confidence:94, file:'demo_vulnerable_app.py:56', before:'subprocess.run(f"ping -c 4 {host}", shell=True)', after:'subprocess.run(["ping", "-c", "4", host])' },
            { type:'Cross-Site Scripting', severity:'high', confidence:91, file:'demo_vulnerable_app.py:71', before:'html = f"<h1>Welcome, {username}!</h1>"', after:'html = f"<h1>Welcome, {escape(username)}!</h1>"' },
            { type:'Path Traversal', severity:'high', confidence:89, file:'demo_vulnerable_app.py:84', before:'filepath = os.path.join("/app/uploads", filename)', after:'safe = secure_filename(filename)\nfilepath = os.path.join("/app/uploads", safe)' },
        ];

        function VulnDiffViewer({ diffs }) {
            const [open, setOpen] = useState(true);
            if (!diffs || !diffs.length) return null;
            return (
                <div className="diff-viewer glass-panel">
                    <div className="diff-viewer-header" onClick={()=>setOpen(!open)}><h2>🔀 Vulnerability Patches ({diffs.length})</h2><span className="diff-toggle">{open?'▼ Collapse':'▶ Expand'}</span></div>
                    {open && <div className="diff-list">{diffs.map((d,i)=>(<div key={i} className="diff-item"><div className="diff-item-header"><span className="diff-vuln-type">{d.type}</span><span className={`diff-severity ${d.severity}`}>{d.severity==='crit'?'Critical':'High'}</span><span className="diff-file">{d.file}</span><span className="diff-confidence">✅ {d.confidence}%</span></div><div className="diff-panels"><div className="diff-panel before"><div className="diff-panel-label">⛔ Vulnerable</div>{d.before}</div><div className="diff-panel after"><div className="diff-panel-label">✅ Patched</div>{d.after}</div></div></div>))}</div>}
                </div>
            );
        }

        function LiveFeed({ demoLog }) {
            const [events, setEvents] = useState([]);
            useEffect(() => {
                let es; try { es = new EventSource('/api/events'); es.onmessage = (e) => { try { const evt = JSON.parse(e.data); if (evt.type==='heartbeat') return; setEvents(prev=>[...prev.slice(-49),evt]); } catch(err){} }; es.onerror = () => es.close(); } catch(err) {}
                return () => { if (es) es.close(); };
            }, []);
            const all = [...(demoLog||[]), ...events];
            if (!all.length) return null;
            return (
                <div className="live-feed glass-panel">
                    <div className="live-feed-header"><h2>⚡ Live Agent Feed</h2><span className="refresh-text">{all.length} events</span></div>
                    <div className="feed-list">{all.map((e,i)=>(<div key={i} className="feed-entry"><span className="feed-time">{e.timestamp?new Date(e.timestamp).toLocaleTimeString():''}</span>{e.message}</div>))}</div>
                </div>
            );
        }

        function App() {
            const [data, setData] = useState(MOCK_DATA);
            const [isLive, setIsLive] = useState(false);
            const [demoRunning, setDemoRunning] = useState(false);
            const [demoStatus, setDemoStatus] = useState('idle');
            const [diffs, setDiffs] = useState(DEMO_VULNS.slice(0,2));
            const [pipelineState, setPipelineState] = useState({ phase:0, agents:{} });
            const [liveLog, setLiveLog] = useState([]);

            const addLog = (msg) => setLiveLog(prev => [{ message:msg, timestamp:new Date().toISOString() }, ...prev].slice(0,50));

            useEffect(() => {
                let es; try { es = new EventSource('/api/events'); es.onmessage = (e) => { try { const evt = JSON.parse(e.data); if (evt.type==='heartbeat') return;
                if (evt.type==='pipeline_start') { setPipelineState({phase:0,agents:{}}); setTimeout(()=>setPipelineState(s=>({...s,phase:0.5})),100); }
                else if (evt.type==='phase_start') { const ph=evt.phase||1; setPipelineState(s=>{const na={...s.agents};(evt.agents||[]).forEach(a=>{na[a]={status:'running'}});return{phase:ph,agents:na};}); }
                else if (evt.type==='agent_complete') { setPipelineState(s=>{const na={...s.agents};na[evt.agent]={status:evt.status==='error'?'error':'done',time:evt.time};return{...s,agents:na};}); }
                else if (evt.type==='pipeline_complete') { setPipelineState(s=>{const na={};Object.keys(s.agents).forEach(k=>{na[k]={...s.agents[k],status:'done'};});return{phase:4,agents:na};}); setDemoRunning(false); setDemoStatus('done'); setTimeout(()=>setDemoStatus('idle'),3000); }
                else if (evt.type==='pipeline_error') { setDemoRunning(false); setDemoStatus('idle'); }
                } catch(err){} }; es.onerror = () => es.close(); } catch(err) {}
                return () => { if (es) es.close(); };
            }, []);

            const runDemo = async () => {
                setDemoRunning(true); setDemoStatus('running');
                setPipelineState({phase:0,agents:{}}); setDiffs([]);
                addLog('📋 Processing MR !44: feat: add user payment & auth flow');
                try { const resp = await fetch('/trigger-test',{method:'POST'}); if (!resp.ok) throw new Error(); }
                catch(e) {
                    const delay = ms => new Promise(r=>setTimeout(r,ms));
                    addLog('⚡ Phase 1: SecurityAgent + GreenOpsAgent + ValidationAgent');
                    setPipelineState({phase:1,agents:{security:{status:'running'},greenops:{status:'running'},validation:{status:'running'}}});
                    await delay(600);
                    addLog('🔐 Scanning for vulnerabilities...');
                    for (let i=0;i<DEMO_VULNS.length;i++) { setDiffs(prev=>[...prev,DEMO_VULNS[i]]); addLog(`  ✅ Patched ${DEMO_VULNS[i].type} (${DEMO_VULNS[i].confidence}%)`); await delay(350); }
                    addLog('🌱 GreenOps: Region optimized → europe-north1');
                    setPipelineState({phase:1,agents:{security:{status:'done',time:4.1},greenops:{status:'done',time:1.9},validation:{status:'done',time:2.3}}});
                    await delay(500);
                    addLog('🧠 Phase 2: RiskEngine decision');
                    setPipelineState(s=>({...s,phase:2,agents:{...s.agents,risk:{status:'running'}}}));
                    await delay(1200);
                    addLog('🧠 RiskEngine: NEEDS_FIX — 87% confidence');
                    setPipelineState(s=>({...s,agents:{...s.agents,risk:{status:'done',time:2.8}}}));
                    await delay(400);
                    addLog('📋 Phase 3: Compliance + Deploy');
                    setPipelineState(s=>({...s,phase:3,agents:{...s.agents,compliance:{status:'running'},deploy:{status:'running'}}}));
                    await delay(800);
                    setPipelineState(s=>({phase:4,agents:{...s.agents,compliance:{status:'done',time:1.7},deploy:{status:'done',time:3.1}}}));
                    setData(prev=>[{mr_iid:44,mr_title:'feat: add user payment & auth flow',author:'demo-dev',decision:'NEEDS_FIX',confidence:87,sec_score:62,eco_score:91,co2_saved:2.1,deploy_url:'https://auraops-demo-v44.run.app',elapsed:14,timestamp:new Date().toISOString(),patches_committed:5,vuln_count:5,time_saved_min:130},...prev]);
                    addLog('✅ Complete — 5 vulns patched, 130 min saved');
                    setDemoRunning(false); setDemoStatus('done');
                    setTimeout(()=>setDemoStatus('idle'),4000);
                }
            };

            const fetchData = useCallback(async () => {
                try { const r=await fetch('/api/history'); if(r.ok){const j=await r.json(); if(Array.isArray(j)&&j.length>0){setData(j);setIsLive(true);return;}} } catch(e){}
                setData(MOCK_DATA); setIsLive(false);
            }, []);

            useEffect(() => { fetchData(); const i=setInterval(fetchData,30000); return ()=>clearInterval(i); }, [fetchData]);

            return (
                <div className="app-container">
                    <Header isLive={isLive} demoStatus={demoStatus} demoRunning={demoRunning} onRunDemo={runDemo} />
                    <ImpactBanner data={data} />
                    <PipelineViz pipelineState={pipelineState} />
                    <VulnDiffViewer diffs={diffs} />
                    <MetricCards data={data} />
                    <Charts data={data} />
                    <HistoryTable data={data} />
                    <LiveFeed demoLog={liveLog} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
